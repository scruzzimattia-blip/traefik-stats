name: Traefik Stats CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install --break-system-packages -r requirements-app.txt -r requirements-worker.txt pytest pytest-cov

      - name: Run tests
        env:
          DATABASE_URL: "sqlite:///:memory:"
          PYTHONPATH: ${{ github.workspace }}
        run: pytest tests/ -v

  docker-push:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && vars.GITEA_HOST != ''
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Gitea Container Registry
        if: secrets.GITEA_TOKEN != ''
        uses: docker/login-action@v3
        with:
          registry: gitea.${{ vars.GITEA_HOST }}
          username: ${{ secrets.GITEA_USERNAME }}
          password: ${{ secrets.GITEA_TOKEN }}

      - name: Build and push worker image
        if: secrets.GITEA_TOKEN != ''
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.worker
          push: true
          tags: gitea.${{ vars.GITEA_HOST }}/${{ github.repository }}/traefik-stats-worker:${{ github.sha }},gitea.${{ vars.GITEA_HOST }}/${{ github.repository }}/traefik-stats-worker:latest

      - name: Build and push app image
        if: secrets.GITEA_TOKEN != ''
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: gitea.${{ vars.GITEA_HOST }}/${{ github.repository }}/traefik-stats-app:${{ github.sha }},gitea.${{ vars.GITEA_HOST }}/${{ github.repository }}/traefik-stats-app:latest

      - name: Skip push
        if: secrets.GITEA_TOKEN == ''
        run: echo "Skipping docker push - GITEA_TOKEN not configured"