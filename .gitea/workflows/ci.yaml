name: Traefik Stats CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install --break-system-packages -r requirements-app.txt -r requirements-worker.txt pytest pytest-cov

      - name: Run tests
        env:
          DATABASE_URL: "sqlite:///:memory:"
          PYTHONPATH: ${{ github.workspace }}
        run: pytest tests/ -v

  docker-push:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            image=moby/buildkit:buildx-stable-1
            network=host

      - name: Login to Gitea Container Registry
        uses: docker/login-action@v3
        with:
          registry: 192.168.1.41
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and push worker image
        continue-on-error: true
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.worker
          push: true
          tags: 192.168.1.41/Mattia/traefik-stats/traefik-stats-worker:${{ github.sha }},192.168.1.41/Mattia/traefik-stats/traefik-stats-worker:latest

      - name: Build and push app image
        continue-on-error: true
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: 192.168.1.41/Mattia/traefik-stats/traefik-stats-app:${{ github.sha }},192.168.1.41/Mattia/traefik-stats/traefik-stats-app:latest

      - name: Summary
        run: |
          echo "Docker push completed (may have failed if registry not configured)"
          echo "Worker: git.scruzzi.com/traefik-stats/traefik-stats-worker:${{ github.sha }}"
          echo "App: git.scruzzi.com/traefik-stats/traefik-stats-app:${{ github.sha }}"