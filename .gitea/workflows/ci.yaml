name: Traefik Stats CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install --break-system-packages -r requirements-app.txt -r requirements-worker.txt pytest pytest-cov

      - name: Run tests with coverage
        env:
          DATABASE_URL: "sqlite:///:memory:"
          PYTHONPATH: ${{ github.workspace }}
        run: pytest tests/ -v --cov=. --cov-report=term-missing

  docker-build:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Get version and prepare repo name
        id: prep
        run: |
          if [ -f VERSION ]; then
            VERSION=$(cat VERSION)
          else
            VERSION="1.0.0"
          fi
          # Lowercase owner name
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "owner=$OWNER" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION for owner: $OWNER"

      - name: Login to Gitea Registry
        run: |
          echo "${{ secrets.REGISTRY_PASSWORD }}" | docker login 192.168.1.41:3000 --username "${{ github.actor }}" --password-stdin

      - name: Build worker image with cache
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.worker
          push: true
          tags: |
            192.168.1.41:3000/${{ steps.prep.outputs.owner }}/traefik-stats/traefik-stats-worker:latest
            192.168.1.41:3000/${{ steps.prep.outputs.owner }}/traefik-stats/traefik-stats-worker:${{ steps.prep.outputs.version }}
            192.168.1.41:3000/${{ steps.prep.outputs.owner }}/traefik-stats/traefik-stats-worker:${{ github.sha }}
          cache-from: type=gha,scope=worker
          cache-to: type=gha,mode=max,scope=worker

      - name: Build app image with cache
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            192.168.1.41:3000/${{ steps.prep.outputs.owner }}/traefik-stats/traefik-stats-app:latest
            192.168.1.41:3000/${{ steps.prep.outputs.owner }}/traefik-stats/traefik-stats-app:${{ steps.prep.outputs.version }}
            192.168.1.41:3000/${{ steps.prep.outputs.owner }}/traefik-stats/traefik-stats-app:${{ github.sha }}
          cache-from: type=gha,scope=app
          cache-to: type=gha,mode=max,scope=app

      - name: Increment version
        if: success()
        run: |
          VERSION="${{ steps.prep.outputs.version }}"
          MAJOR=$(echo $VERSION | cut -d. -f1)
          MINOR=$(echo $VERSION | cut -d. -f2)
          PATCH=$(echo $VERSION | cut -d. -f3)
          NEW_VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))"
          echo $NEW_VERSION > VERSION
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"
          git add VERSION
          git commit -m "Bump version to ${NEW_VERSION}" || echo "No changes to commit"
          git push