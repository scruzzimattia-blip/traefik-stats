name: Traefik Stats CI

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements-app.txt ]; then pip install -r requirements-app.txt; fi
          if [ -f requirements-worker.txt ]; then pip install -r requirements-worker.txt; fi
          pip install pytest pytest-mock

      - name: Run tests
        run: |
          # Use a fake DATABASE_URL for tests to avoid connection issues
          export DATABASE_URL=sqlite:///:memory:
          export PYTHONPATH=$PYTHONPATH:.
          pytest tests/
