name: Traefik Stats CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-lint-${{ hashFiles('requirements-app.txt', 'requirements-worker.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install linters
        run: uv pip install ruff mypy types-requests types-redis --system

      - name: Run Ruff
        run: ruff check --exit-zero .

      - name: Run MyPy
        run: mypy worker.py models.py data_service.py app.py crowdsec.py --ignore-missing-imports || true

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-test-${{ hashFiles('requirements-app.txt', 'requirements-worker.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install dependencies
        run: |
          uv pip install -r requirements-app.txt --system || true
          uv pip install -r requirements-worker.txt --system || true
          uv pip install pytest pytest-cov pytest-mock --system

      - name: Run tests
        env:
          DATABASE_URL: "sqlite:///:memory:"
          PYTHONPATH: ${{ github.workspace }}
        run: |
          pytest tests/ -v --cov=. --cov-report=xml --cov-report=term-missing

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build worker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.worker
          load: true
          tags: traefik-stats-worker:test

      - name: Build app image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          load: true
          tags: traefik-stats-app:test

  security:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Run security scan
        run: |
          uv pip install safety bandit --system
          safety check --json | tee safety.json || true
          bandit -r . -f json -o bandit.json || true

  docker-push:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    needs: [lint, test, docker-build]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Gitea Container Registry
        uses: docker/login-action@v3
        with:
          registry: gitea.${{ vars.GITEA_HOST }}
          username: ${{ secrets.GITEA_USERNAME }}
          password: ${{ secrets.GITEA_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: gitea.${{ vars.GITEA_HOST }}/${{ github.repository }}/traefik-stats-worker
          tags: |
            type=ref,event=branch
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push worker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.worker
          push: true
          tags: gitea.${{ vars.GITEA_HOST }}/${{ github.repository }}/traefik-stats-worker:${{ github.sha }},gitea.${{ vars.GITEA_HOST }}/${{ github.repository }}/traefik-stats-worker:latest

      - name: Build and push app image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: gitea.${{ vars.GITEA_HOST }}/${{ github.repository }}/traefik-stats-app:${{ github.sha }},gitea.${{ vars.GITEA_HOST }}/${{ github.repository }}/traefik-stats-app:latest