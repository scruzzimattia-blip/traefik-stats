name: Traefik Stats CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: write
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -r requirements-app.txt -r requirements-worker.txt pytest pytest-cov

      - name: Run tests with coverage
        env:
          DATABASE_URL: "sqlite:///:memory:"
          PYTHONPATH: ${{ github.workspace }}
        run: pytest tests/ -v --cov=. --cov-report=term-missing

  docker-build:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get version and prepare repo name
        id: prep
        run: |
          if [ -f VERSION ]; then
            VERSION=$(cat VERSION)
          else
            VERSION="1.0.0"
          fi
          # Lowercase owner and repo for Docker tags
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "repo=$REPO_LOWER" >> $GITHUB_OUTPUT

      - name: Build and push worker
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.worker
          push: true
          tags: |
            ghcr.io/${{ steps.prep.outputs.repo }}-worker:latest
            ghcr.io/${{ steps.prep.outputs.repo }}-worker:${{ steps.prep.outputs.version }}
            ghcr.io/${{ steps.prep.outputs.repo }}-worker:${{ github.sha }}
          cache-from: type=gha,scope=worker
          cache-to: type=gha,mode=max,scope=worker

      - name: Build and push app
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ steps.prep.outputs.repo }}-app:latest
            ghcr.io/${{ steps.prep.outputs.repo }}-app:${{ steps.prep.outputs.version }}
            ghcr.io/${{ steps.prep.outputs.repo }}-app:${{ github.sha }}
          cache-from: type=gha,scope=app
          cache-to: type=gha,mode=max,scope=app

      - name: Increment version
        if: success()
        run: |
          VERSION="${{ steps.prep.outputs.version }}"
          MAJOR=$(echo $VERSION | cut -d. -f1)
          MINOR=$(echo $VERSION | cut -d. -f2)
          PATCH=$(echo $VERSION | cut -d. -f3)
          NEW_VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))"
          echo $NEW_VERSION > VERSION
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"
          git add VERSION
          git commit -m "chore: bump version to ${NEW_VERSION} [skip ci]" || echo "No changes to commit"
          git push
