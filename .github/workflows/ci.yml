name: Traefik Stats CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-app.txt -r requirements-worker.txt pytest pytest-cov

      - name: Run tests with coverage
        env:
          DATABASE_URL: "sqlite:///:memory:"
          PYTHONPATH: ${{ github.workspace }}
        run: pytest tests/ -v --cov=. --cov-report=term-missing

  docker-build:
    permissions:
      contents: read
      packages: write
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    needs: test
    env:
      REGISTRY: ${{ vars.REGISTRY != '' && vars.REGISTRY || 'ghcr.io' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Image name prefix
        id: image
        run: |
          p=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')
          echo "prefix=$p" >> "$GITHUB_OUTPUT"

      - name: Determine whether to push images
        id: auth
        run: |
          if [ "${{ env.REGISTRY }}" = "ghcr.io" ]; then
            echo "push=true" >> "$GITHUB_OUTPUT"
          elif [ -n "${{ secrets.REGISTRY_USERNAME }}" ] && [ -n "${{ secrets.REGISTRY_PASSWORD }}" ]; then
            echo "push=true" >> "$GITHUB_OUTPUT"
          else
            echo "push=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: env.REGISTRY == 'ghcr.io' && steps.auth.outputs.push == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT || secrets.GITHUB_TOKEN }}

      - name: Log in to custom container registry
        if: env.REGISTRY != 'ghcr.io' && steps.auth.outputs.push == 'true'
        env:
          REGISTRY: ${{ env.REGISTRY }}
          REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
          REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
        run: |
          set -euo pipefail
          echo "${REGISTRY_PASSWORD}" | docker login "${REGISTRY}" -u "${REGISTRY_USERNAME}" --password-stdin

      - name: Get version
        id: prep
        run: |
          if [ -f VERSION ]; then
            VERSION="$(cat VERSION)"
          else
            VERSION="1.0.0"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build and push worker
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.worker
          push: ${{ steps.auth.outputs.push == 'true' }}
          tags: |
            ${{ env.REGISTRY }}/${{ steps.image.outputs.prefix }}-worker:latest
            ${{ env.REGISTRY }}/${{ steps.image.outputs.prefix }}-worker:${{ steps.prep.outputs.version }}
            ${{ env.REGISTRY }}/${{ steps.image.outputs.prefix }}-worker:${{ github.sha }}

      - name: Build and push app
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ steps.auth.outputs.push == 'true' }}
          tags: |
            ${{ env.REGISTRY }}/${{ steps.image.outputs.prefix }}-app:latest
            ${{ env.REGISTRY }}/${{ steps.image.outputs.prefix }}-app:${{ steps.prep.outputs.version }}
            ${{ env.REGISTRY }}/${{ steps.image.outputs.prefix }}-app:${{ github.sha }}
