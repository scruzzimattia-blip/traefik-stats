services:
  db:
    image: postgres:15-alpine
    container_name: traefik-stats-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: traefik_stats
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    networks:
      - proxy

  worker:
    build: 
      context: .
      dockerfile: Dockerfile.worker
    container_name: traefik-stats-worker
    restart: unless-stopped
    depends_on:
      - db
    entrypoint: ["python", "worker.py"]
    environment:
      DATABASE_URL: postgresql://user:password@db:5432/traefik_stats
      RETENTION_DAYS: 30
      CROWDSEC_LAPI_URL: http://traefik-stats-crowdsec:8080
      CROWDSEC_LAPI_KEY: ${CROWDSEC_LAPI_KEY}
      CROWDSEC_MACHINE_PASSWORD: ${CROWDSEC_MACHINE_PASSWORD}
    volumes:
      - /home/mattia/proxy/traefik/access.log:/app/logs/access.log:ro
      - /home/mattia/proxy/data/crowdsec/data/GeoLite2-City.mmdb:/app/geoip/city.mmdb:ro
      - /home/mattia/proxy/data/crowdsec/data/GeoLite2-ASN.mmdb:/app/geoip/asn.mmdb:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - proxy

  traefik-stats:
    build: .
    container_name: traefik-stats
    restart: unless-stopped
    depends_on:
      - db
    entrypoint: ["streamlit", "run", "app.py", "--server.port=8501", "--server.address=0.0.0.0"]
    environment:
      DATABASE_URL: postgresql://user:password@db:5432/traefik_stats
      CROWDSEC_LAPI_URL: http://traefik-stats-crowdsec:8080
      CROWDSEC_LAPI_KEY: ${CROWDSEC_LAPI_KEY}
      CROWDSEC_MACHINE_PASSWORD: ${CROWDSEC_MACHINE_PASSWORD}
    volumes:
      - /home/mattia/proxy/data/crowdsec/data/GeoLite2-City.mmdb:/app/geoip/city.mmdb:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - proxy
    ports:
      - "8501:8501"

  crowdsec:
    image: crowdsecurity/crowdsec:latest
    container_name: traefik-stats-crowdsec
    restart: unless-stopped
    environment:
      COLLECTIONS: "crowdsecurity/traefik crowdsecurity/http-cve"
      # We'll use the worker's detection mostly, but CrowdSec can also watch the logs
    volumes:
      - /home/mattia/proxy/traefik/access.log:/var/log/traefik/access.log:ro
      - ./crowdsec_data:/var/lib/crowdsec/data
      - ./crowdsec_config:/etc/crowdsec
    networks:
      - proxy
    ports:
      - "8082:8080"

networks:
  proxy:
    external: true
